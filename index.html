<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRAX COSMIC HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at center, #0a0a2e 0%, #050505 100%);
            color: #e0e0e0;
            overflow-x: hidden;
            margin: 0;
        }

        .universe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        /* Glass Effect */
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(167, 139, 250, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* Drawing Style Layout Columns */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Massive Pop-Out Effect */
        .category-card {
            position: relative;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
            border-radius: 30px;
            overflow: hidden;
        }

        .category-card:hover {
            transform: scale(1.1) translateY(-10px) rotateX(5deg);
            z-index: 50;
            box-shadow: 0 30px 70px rgba(167, 139, 250, 0.5);
            border-color: #a78bfa;
        }

        /* Play Text Overlay (Only shows on hover) */
        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(124, 58, 237, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 2rem;
            font-weight: 900;
            text-shadow: 0 0 20px #fff;
        }

        .category-card:hover .play-overlay {
            opacity: 1;
        }

        /* Natural Bubble Animation */
        .particle { 
            position: absolute; 
            background: rgba(196, 181, 253, 0.15); 
            border-radius: 50%; 
            pointer-events: none;
            will-change: transform;
            animation: floatCosmic linear infinite; 
        }

        @keyframes floatCosmic { 
            0% { transform: translateY(110vh) scale(0.8); opacity: 0; } 
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; } 
        }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="universe" id="universe"></div>

    <nav class="fixed top-0 w-full z-[100] glass-card px-8 py-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <i class="fas fa-gamepad text-4xl text-violet-400"></i>
            <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400">RUDRAX</h1>
        </div>
        <div class="relative w-80">
            <input id="searchInput" type="text" placeholder="Search categories..." class="w-full bg-zinc-900/80 border border-violet-500/50 rounded-full py-2 px-10 text-white outline-none focus:border-violet-400">
            <i class="fas fa-search absolute left-4 top-3 text-violet-400"></i>
        </div>
    </nav>

    <div class="pt-48 pb-16 text-center relative z-10">
        <h2 class="text-6xl md:text-8xl font-black tracking-tighter">
            COSMIC <span class="text-violet-500">ACTION</span>
        </h2>
    </div>

    <main class="relative z-10 px-6 pb-20">
        <div class="main-container">
            
            <div class="space-y-12">
                <div class="category-group">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4 text-cyan-400"><i class="fas fa-puzzle-piece"></i> PUZZLE</h3>
                    <a href="2048.html" class="category-card glass-card block">
                        <div class="h-64 bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center text-8xl">🟦</div>
                        <div class="p-8 text-center"><h4 class="text-2xl font-bold">2048 MATRIX</h4></div>
                        <div class="play-overlay">PLAY NOW</div>
                    </a>
                </div>

                <div class="category-group">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4 text-emerald-400"><i class="fas fa-mountain"></i> ADVENTURE</h3>
                    <a href="tictactoe.html" class="category-card glass-card block">
                        <div class="h-64 bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center text-8xl">❌⭕</div>
                        <div class="p-8 text-center"><h4 class="text-2xl font-bold">NEON TIC-TAC-TOE</h4></div>
                        <div class="play-overlay">PLAY NOW</div>
                    </a>
                </div>
            </div>

            <div class="space-y-12">
                <div class="category-group">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4 text-red-400"><i class="fas fa-bolt"></i> ACTION</h3>
                    <a href="snake.html" class="category-card glass-card block">
                        <div class="h-64 bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-8xl">🐍</div>
                        <div class="p-8 text-center"><h4 class="text-2xl font-bold">SNAKE PROTOCOL</h4></div>
                        <div class="play-overlay">PLAY NOW</div>
                    </a>
                </div>

                <div class="category-group">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4 text-orange-400"><i class="fas fa-car-side"></i> RACING</h3>
                    <a href="#" class="category-card glass-card block">
                        <div class="h-64 bg-gradient-to-br from-orange-500 to-yellow-500 flex items-center justify-center text-8xl">🏎️</div>
                        <div class="p-8 text-center"><h4 class="text-2xl font-bold">TURBO OVERDRIVE</h4></div>
                        <div class="play-overlay">PLAY NOW</div>
                    </a>
                </div>
            </div>
        </div>

        <div class="max-w-[1200px] mx-auto mt-20">
            <div class="glass-card rounded-3xl p-16 text-center border-dashed border-2 border-violet-500/40">
                <h3 class="text-4xl font-bold text-violet-400 mb-2">NEW GAMES & ADS</h3>
                <p class="text-zinc-500 tracking-widest">LOADING NEW COSMIC CONTENT...</p>
            </div>
        </div>
    </main>

    <script>
        // Intense 3D Pop-Out Effect
        document.querySelectorAll('.category-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                // Stronger tilt for "bahar aane wala" look
                card.style.transform = `perspective(1000px) rotateX(${y * -15}deg) rotateY(${x * 15}deg) scale3d(1.1, 1.1, 1.1)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
            });
        });

        // Search Filter
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.category-group').forEach(group => {
                group.style.display = group.textContent.toLowerCase().includes(term) ? 'block' : 'none';
            });
        });

        // 150 Natural Smooth Bubbles
        function initCosmos() {
            const container = document.getElementById('universe');
            for (let i = 0; i < 150; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 30 + 20; 
                p.style.width = p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}vw`;
                p.style.animationDuration = `${Math.random() * 20 + 25}s`;
                p.style.animationDelay = `-${Math.random() * 50}s`;
                container.appendChild(p);
            }
        }
        initCosmos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRAX COSMIC ACTION HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at center, #0a0a2e 0%, #050505 100%);
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .universe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        .game-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        .game-card:hover {
            box-shadow: 0 0 40px rgba(167, 139, 250, 0.4);
            border-color: #a78bfa;
        }
        
        /* Particles (Bubbles) - Bigger and Softer */
        .particle { 
            position: absolute; 
            background: rgba(196, 181, 253, 0.15); 
            border-radius: 50%; 
            box-shadow: 0 0 20px rgba(165, 180, 252, 0.2);
            backdrop-filter: blur(2px);
            animation: floatCosmic linear infinite; 
        }

        @keyframes floatCosmic { 
            0% { transform: translateY(110vh) scale(1); opacity: 0; } 
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; } 
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body class="relative">

    <div class="universe" id="universe"></div>

    <nav class="fixed top-0 w-full z-50 glass-card border-b border-violet-500/30">
        <div class="max-w-7xl mx-auto px-8 py-5 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <i class="fas fa-gamepad text-4xl text-violet-400"></i>
                <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400">RUDRAX</h1>
            </div>
            <div class="relative w-full md:w-80">
                <input id="searchInput" type="text" placeholder="Search categories..." class="w-full bg-zinc-900 border border-violet-500/50 rounded-full py-2 px-10 text-white focus:outline-none focus:border-violet-400">
                <i class="fas fa-search absolute left-4 top-3 text-violet-400"></i>
            </div>
        </div>
    </nav>

    <div class="pt-40 pb-10 text-center relative z-10">
        <h2 class="text-5xl md:text-7xl font-black tracking-tighter">
            COSMIC ACTION <span class="text-violet-500">HUB</span>
        </h2>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-20 relative z-10">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
            
            <div class="space-y-12">
                <section class="category-section">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4"><i class="fas fa-puzzle-piece text-cyan-400"></i> PUZZLE</h3>
                    <a href="2048.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                        <div class="h-56 bg-gradient-to-br from-blue-600/40 to-cyan-500/40 flex items-center justify-center text-7xl">🟦</div>
                        <div class="p-6 text-center"><h4 class="text-xl font-bold">2048 MATRIX</h4></div>
                    </a>
                </section>

                <section class="category-section">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4"><i class="fas fa-mountain text-emerald-400"></i> ADVENTURE</h3>
                    <a href="tictactoe.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                        <div class="h-56 bg-gradient-to-br from-purple-600/40 to-pink-600/40 flex items-center justify-center text-7xl">❌⭕</div>
                        <div class="p-6 text-center"><h4 class="text-xl font-bold">NEON TIC-TAC-TOE</h4></div>
                    </a>
                </section>
            </div>

            <div class="space-y-12">
                <section class="category-section">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4"><i class="fas fa-bolt text-red-400"></i> ACTION</h3>
                    <a href="snake.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                        <div class="h-56 bg-gradient-to-br from-green-500/40 to-emerald-600/40 flex items-center justify-center text-7xl">🐍</div>
                        <div class="p-6 text-center"><h4 class="text-xl font-bold">SNAKE PROTOCOL</h4></div>
                    </a>
                </section>

                <section class="category-section">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4"><i class="fas fa-car-side text-orange-400"></i> RACING</h3>
                    <a href="#" class="game-card glass-card rounded-3xl overflow-hidden block">
                        <div class="h-56 bg-gradient-to-br from-orange-500/40 to-yellow-500/40 flex items-center justify-center text-7xl">🏎️</div>
                        <div class="p-6 text-center"><h4 class="text-xl font-bold">TURBO OVERDRIVE</h4></div>
                    </a>
                </section>
            </div>

        </div>

        <div class="mt-20">
            <h3 class="text-3xl font-bold mb-8 flex items-center gap-4">
                <i class="fas fa-star text-yellow-400"></i> NEW GAMES & ADS ZONE
            </h3>
            <div class="w-full glass-card rounded-3xl p-12 border-dashed border-2 border-violet-500/40 text-center">
                <p class="text-2xl font-bold text-violet-300 opacity-60">🚀 COMING SOON: NEW COSMIC ADVENTURES</p>
                <p class="mt-2 text-zinc-500 italic">Advertisements & Sponsored Content Area</p>
            </div>
        </div>

    </main>

    <script>
        // Smooth 3D Tilt Effect
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                card.style.transform = `perspective(1000px) rotateX(${y * -10}deg) rotateY(${x * 10}deg) scale(1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
            });
        });

        // Search Filter
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.category-section').forEach(sec => {
                sec.style.display = sec.textContent.toLowerCase().includes(term) ? 'block' : 'none';
            });
        });

        // Universe Background: 150 Particles, Big and Slow
        function initCosmos() {
            const container = document.getElementById('universe');
            
            // Generate 150 Particles
            for (let i = 0; i < 150; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 30 + 20; // 20px to 50px
                p.style.width = p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}vw`;
                // Slow floating duration (40s to 70s)
                p.style.animationDuration = `${Math.random() * 30 + 40}s`;
                p.style.animationDelay = `${Math.random() * -60}s`; 
                container.appendChild(p);
            }

            // Simple Stars
            for (let i = 0; i < 120; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 2 + 1;
                s.style.width = s.style.height = `${size}px`;
                s.style.left = `${Math.random() * 100}vw`;
                s.style.top = `${Math.random() * 100}vh`;
                container.appendChild(s);
            }
        }
        initCosmos();
    </script>
</body>
</html>

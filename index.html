<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRAX COSMIC ACTION HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at center, #0a0a2e 0%, #050505 100%);
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .universe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(167, 139, 250, 0.3);
        }

        .game-card {
            transition: transform 0.2s ease-out, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        .game-card:hover {
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.5);
            border-color: #a78bfa;
        }
        
        /* Particle & Stars styling */
        .star { position: absolute; background: white; border-radius: 50%; box-shadow: 0 0 10px #fff; animation: twinkle 4s infinite alternate; }
        .particle { position: absolute; background: #c4b5fd; border-radius: 50%; box-shadow: 0 0 20px #a5b4fc, 0 0 40px #c026d3; animation: floatCosmic linear infinite; }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes floatCosmic { 0% { transform: translateY(110vh); } 100% { transform: translateY(-10vh); } }
    </style>
</head>
<body class="min-h-screen relative">

    <div class="universe" id="universe"></div>

    <nav class="fixed top-0 w-full z-50 glass-card border-b border-violet-500/30">
        <div class="max-w-7xl mx-auto px-8 py-5 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <i class="fas fa-gamepad text-4xl text-violet-400"></i>
                <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400">RUDRAX</h1>
            </div>
            <div class="relative w-full md:w-80">
                <input id="searchInput" type="text" placeholder="Search categories..." class="w-full bg-zinc-900 border border-violet-500/50 rounded-full py-2 px-10 text-white focus:outline-none focus:border-violet-400">
                <i class="fas fa-search absolute left-4 top-3 text-violet-400"></i>
            </div>
        </div>
    </nav>

    <div class="pt-44 pb-16 text-center relative z-10">
        <h2 class="text-5xl md:text-7xl font-black tracking-tighter mb-4">
            COSMIC ACTION<br><span class="text-violet-500">HUB</span>
        </h2>
    </div>

    <div class="max-w-7xl mx-auto px-6 pb-20 relative z-10 space-y-20">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="category-section">
                <h3 class="text-3xl font-bold mb-6 flex items-center gap-4">
                    <i class="fas fa-puzzle-piece text-cyan-400"></i> PUZZLE CATEGORY
                </h3>
                <a href="2048.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                    <div class="h-64 bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center text-8xl">🟦</div>
                    <div class="p-8 text-center"><h4 class="text-2xl font-bold">2048 MATRIX</h4></div>
                </a>
            </div>

            <div class="category-section">
                <h3 class="text-3xl font-bold mb-6 flex items-center gap-4">
                    <i class="fas fa-bolt text-red-400"></i> ACTION CATEGORY
                </h3>
                <a href="snake.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                    <div class="h-64 bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-8xl">🐍</div>
                    <div class="p-8 text-center"><h4 class="text-2xl font-bold">SNAKE PROTOCOL</h4></div>
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="category-section">
                <h3 class="text-3xl font-bold mb-6 flex items-center gap-4">
                    <i class="fas fa-mountain text-emerald-400"></i> ADVENTURE CATEGORY
                </h3>
                <a href="tictactoe.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                    <div class="h-64 bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center text-8xl">❌⭕</div>
                    <div class="p-8 text-center"><h4 class="text-2xl font-bold">NEON TIC-TAC-TOE</h4></div>
                </a>
            </div>

            <div class="category-section">
                <h3 class="text-3xl font-bold mb-6 flex items-center gap-4">
                    <i class="fas fa-car-side text-orange-400"></i> RACING CATEGORY
                </h3>
                <a href="#" class="game-card glass-card rounded-3xl overflow-hidden block">
                    <div class="h-64 bg-gradient-to-br from-orange-500 to-yellow-500 flex items-center justify-center text-8xl">🏎️</div>
                    <div class="p-8 text-center"><h4 class="text-2xl font-bold">TURBO OVERDRIVE</h4></div>
                </a>
            </div>
        </div>

        <div class="category-section">
            <h3 class="text-3xl font-bold mb-8 flex items-center gap-4">
                <i class="fas fa-star text-yellow-400"></i> KIDS ENGAGEMENT ZONE
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="game-card glass-card rounded-3xl h-64 flex items-center justify-center text-center p-8 border border-dashed border-violet-400 opacity-60">
                    <div><p class="text-4xl mb-2">🌟</p><p class="text-lg font-bold">Coming Soon</p></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Fix 3D Tilt Effect
        const cards = document.querySelectorAll('.game-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                card.style.transform = `perspective(1000px) rotateX(${-y / 15}deg) rotateY(${x / 15}deg) scale(1.05)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
            });
        });

        // Search Logic
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.category-section').forEach(sec => {
                const text = sec.textContent.toLowerCase();
                sec.style.display = text.includes(term) ? 'block' : 'none';
            });
        });

        // Universe Background (Stars & Big Bubbles)
        function initCosmos() {
            const container = document.getElementById('universe');
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 15 + 10;
                p.style.width = p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}vw`;
                p.style.animationDuration = `${Math.random() * 30 + 20}s`;
                p.style.opacity = Math.random() * 0.4;
                container.appendChild(p);
            }
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3 + 1;
                s.style.width = s.style.height = `${size}px`;
                s.style.left = `${Math.random() * 100}vw`;
                s.style.top = `${Math.random() * 100}vh`;
                container.appendChild(s);
            }
        }
        initCosmos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRAX COSMIC HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at center, #0a0a2e 0%, #050505 100%);
            color: #e0e0e0;
            overflow-x: hidden;
            margin: 0;
        }

        .universe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(167, 139, 250, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Strong 3D Effect */
        .game-card {
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .game-card:hover {
            box-shadow: 0 20px 50px rgba(167, 139, 250, 0.6);
            border-color: #a78bfa;
            z-index: 20;
        }
        
        /* Smooth Bubbles (GPU Accelerated) */
        .particle { 
            position: absolute; 
            background: rgba(196, 181, 253, 0.2); 
            border-radius: 50%; 
            pointer-events: none;
            will-change: transform;
            animation: floatCosmic linear infinite; 
        }

        @keyframes floatCosmic { 
            0% { transform: translateY(110vh) translateZ(0); opacity: 0; } 
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) translateZ(0); opacity: 0; } 
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.4; }
    </style>
</head>
<body class="relative">

    <div class="universe" id="universe"></div>

    <nav class="fixed top-0 w-full z-50 glass-card">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <i class="fas fa-gamepad text-4xl text-violet-400"></i>
                <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400">RUDRAX</h1>
            </div>
            <div class="hidden md:block relative w-80">
                <input id="searchInput" type="text" placeholder="Search..." class="w-full bg-zinc-900/80 border border-violet-500/50 rounded-full py-2 px-10 text-white outline-none">
                <i class="fas fa-search absolute left-4 top-3 text-violet-400"></i>
            </div>
        </div>
    </nav>

    <div class="pt-44 pb-12 text-center relative z-10">
        <h2 class="text-6xl md:text-8xl font-black tracking-tighter">
            COSMIC <span class="text-violet-500">HUB</span>
        </h2>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-20 relative z-10">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <div class="space-y-12">
                <div class="category-section">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4 text-cyan-400"><i class="fas fa-puzzle-piece"></i> PUZZLE</h3>
                    <a href="2048.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                        <div class="h-64 bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center text-8xl">🟦</div>
                        <div class="p-8 text-center"><h4 class="text-2xl font-bold">2048 MATRIX</h4></div>
                    </a>
                </div>
                <div class="category-section">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4 text-emerald-400"><i class="fas fa-mountain"></i> ADVENTURE</h3>
                    <a href="tictactoe.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                        <div class="h-64 bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center text-8xl">❌⭕</div>
                        <div class="p-8 text-center"><h4 class="text-2xl font-bold">NEON TIC-TAC-TOE</h4></div>
                    </a>
                </div>
            </div>

            <div class="space-y-12">
                <div class="category-section">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4 text-red-400"><i class="fas fa-bolt"></i> ACTION</h3>
                    <a href="snake.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                        <div class="h-64 bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-8xl">🐍</div>
                        <div class="p-8 text-center"><h4 class="text-2xl font-bold">SNAKE PROTOCOL</h4></div>
                    </a>
                </div>
                <div class="category-section">
                    <h3 class="text-3xl font-bold mb-6 flex items-center gap-4 text-orange-400"><i class="fas fa-car-side"></i> RACING</h3>
                    <a href="#" class="game-card glass-card rounded-3xl overflow-hidden block">
                        <div class="h-64 bg-gradient-to-br from-orange-500 to-yellow-500 flex items-center justify-center text-8xl">🏎️</div>
                        <div class="p-8 text-center"><h4 class="text-2xl font-bold">TURBO OVERDRIVE</h4></div>
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-20">
            <div class="glass-card rounded-3xl p-16 text-center border-dashed border-2 border-violet-500/50">
                <h3 class="text-4xl font-bold text-violet-400 mb-4">NEW GAMES & ADS</h3>
                <p class="text-zinc-400 text-xl tracking-widest uppercase">Initializing New Cosmic Content...</p>
            </div>
        </div>
    </main>

    <script>
        // High-Response 3D Tilt Effect
        const cards = document.querySelectorAll('.game-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Increased intensity for "screen bahar aana" feel
                const rotateX = (centerY - y) / 10; 
                const rotateY = (x - centerX) / 10;

                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.08, 1.08, 1.08)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
            });
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.category-section').forEach(sec => {
                sec.style.display = sec.textContent.toLowerCase().includes(term) ? 'block' : 'none';
            });
        });

        // Optimized Smooth Bubbles
        function initCosmos() {
            const container = document.getElementById('universe');
            const count = 120; // Balanced for performance and look
            
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 35 + 20; 
                p.style.width = p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}vw`;
                
                // Varied but smooth speed
                const duration = Math.random() * 20 + 30; 
                p.style.animationDuration = `${duration}s`;
                p.style.animationDelay = `-${Math.random() * 40}s`;
                
                container.appendChild(p);
            }

            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 2 + 1;
                s.style.width = s.style.height = `${size}px`;
                s.style.left = `${Math.random() * 100}vw`;
                s.style.top = `${Math.random() * 100}vh`;
                container.appendChild(s);
            }
        }
        initCosmos();
    </script>
</body>
</html>

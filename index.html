<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRAX COSMIC ACTION HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at center, #0a0a2e 0%, #050505 100%);
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Universe Background */
        .universe {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: twinkle 4s infinite alternate;
        }

        .particle {
            position: absolute;
            background: #c4b5fd;
            border-radius: 50%;
            box-shadow: 0 0 20px #a5b4fc, 0 0 40px #c026d3;
            animation: floatCosmic linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes floatCosmic {
            0% { transform: translateY(110vh) translateX(0); }
            100% { transform: translateY(-20vh) translateX(20px); }
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(167, 139, 250, 0.3);
        }

        .game-card {
            transition: transform 0.2s ease-out, box-shadow 0.3s ease;
            transform-style: preserve-3d;
            border: 2px solid transparent;
        }

        .game-card:hover {
            border-color: #a78bfa;
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.5);
        }

        .nav-glass {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body class="min-h-screen relative">

    <div class="universe" id="universe"></div>

    <nav class="fixed top-0 w-full z-50 nav-glass border-b border-violet-500/30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <i class="fas fa-rocket text-4xl text-violet-400 animate-pulse"></i>
                <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400">RUDRAX</h1>
            </div>
            
            <div class="relative w-full md:w-96">
                <input id="searchInput" 
                       type="text" 
                       placeholder="Search universe games..." 
                       class="w-full bg-zinc-900/80 border border-violet-500/50 rounded-full py-3 px-12 text-white focus:outline-none focus:ring-2 focus:ring-violet-400 transition-all">
                <i class="fas fa-search absolute left-5 top-4 text-violet-400"></i>
            </div>
        </div>
    </nav>

    <div class="pt-44 pb-16 text-center relative z-10 px-4">
        <h2 class="text-5xl md:text-7xl font-black tracking-tighter mb-4 text-white">
            COSMIC ACTION<br><span class="text-violet-500">HUB</span>
        </h2>
        <p class="text-xl text-violet-300 tracking-widest">EXPLORE • PLAY • DOMINATE</p>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-20 relative z-10 space-y-24">
        
        <section id="puzzle">
            <h3 class="text-3xl font-bold mb-8 flex items-center gap-4"><i class="fas fa-puzzle-piece text-cyan-400"></i> PUZZLE SECTOR</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="puzzle-grid">
                <a href="2048.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                    <div class="h-48 bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center text-7xl">🟦</div>
                    <div class="p-6 text-center"><h4 class="text-xl font-bold">2048 MATRIX</h4></div>
                </a>
                <a href="snake.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                    <div class="h-48 bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-7xl">🐍</div>
                    <div class="p-6 text-center"><h4 class="text-xl font-bold">SNAKE PROTOCOL</h4></div>
                </a>
                <a href="tictactoe.html" class="game-card glass-card rounded-3xl overflow-hidden block">
                    <div class="h-48 bg-gradient-to-br from-red-500 to-pink-600 flex items-center justify-center text-7xl">❌⭕</div>
                    <div class="p-6 text-center"><h4 class="text-xl font-bold">NEON TIC-TAC-TOE</h4></div>
                </a>
            </div>
        </section>

        <section id="racing">
            <h3 class="text-3xl font-bold mb-8 flex items-center gap-4"><i class="fas fa-car-side text-orange-400"></i> RACING HUB</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="game-card glass-card rounded-3xl overflow-hidden p-10 text-center opacity-75">
                    <i class="fas fa-car text-6xl text-orange-500 mb-4"></i>
                    <h4 class="text-xl font-bold">TURBO OVERDRIVE</h4>
                    <p class="text-gray-400 text-sm mt-2">Coming Soon...</p>
                </div>
            </div>
        </section>

        <section id="action">
            <h3 class="text-3xl font-bold mb-8 flex items-center gap-4"><i class="fas fa-bolt text-red-400"></i> ACTION ZONE</h3>
            <div class="game-card glass-card rounded-3xl p-10 text-center italic text-gray-500">
                Initializing combat modules...
            </div>
        </section>

    </main>

    <script>
        // 3D Tilt Effect - Fixed
        const cards = document.querySelectorAll('.game-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                const rotateX = -y / 12;
                const rotateY = x / 12;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
            });
        });

        // Search Filter
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.game-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        });

        // Cosmic Background
        function initCosmos() {
            const container = document.getElementById('universe');
            
            // Big Bubbles
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 15 + 10;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}vw`;
                p.style.animationDuration = `${Math.random() * 30 + 20}s`;
                p.style.animationDelay = `-${Math.random() * 20}s`;
                p.style.opacity = Math.random() * 0.5;
                container.appendChild(p);
            }

            // Twinkling Stars
            for (let i = 0; i < 120; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3 + 1;
                s.style.width = `${size}px`;
                s.style.height = `${size}px`;
                s.style.left = `${Math.random() * 100}vw`;
                s.style.top = `${Math.random() * 100}vh`;
                s.style.animationDelay = `-${Math.random() * 5}s`;
                container.appendChild(s);
            }
        }
        initCosmos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRAX • COSMIC ACTION HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600&display=swap');

        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: #e0e0e0;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        h1, h2, h3, h4, .nav-font { font-family: 'Orbitron', sans-serif; }

        /* Universe Background Effects */
        .nebula {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.1) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(105vh) scale(1); opacity: 0; }
            to { transform: translateY(-10vh) scale(0.5); opacity: 0.8; }
        }

        /* Glassmorphism & UI */
        .glass-nav {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(167, 139, 250, 0.3);
        }

        .search-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 50px;
            padding: 5px 20px;
            transition: all 0.3s ease;
        }

        .search-container:focus-within {
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }

        .game-card {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            transform-style: preserve-3d;
        }

        .game-card:hover {
            border-color: #a78bfa;
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
        }

        .glow-text { text-shadow: 0 0 15px rgba(167, 139, 250, 0.8); }
    </style>
</head>
<body>

    <div class="nebula"></div>
    <div class="particles" id="particles"></div>

    <nav class="fixed top-0 w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fas fa-atom text-3xl text-cyan-400 animate-spin-slow"></i>
                <h1 class="text-2xl font-bold tracking-widest glow-text">RUDRAX</h1>
            </div>

            <div class="search-container flex items-center gap-3 w-full md:w-auto">
                <i class="fas fa-search text-gray-400"></i>
                <input type="text" id="gameSearch" placeholder="Search universe games..." 
                    class="bg-transparent border-none outline-none text-white placeholder-gray-500 text-sm w-full md:w-64 py-1">
            </div>

            <div class="hidden lg:flex gap-8 text-xs font-bold tracking-widest nav-font">
                <a href="#puzzle" class="hover:text-cyan-400 transition">PUZZLE</a>
                <a href="#racing" class="hover:text-orange-400 transition">RACING</a>
                <a href="#action" class="hover:text-red-400 transition">ACTION</a>
            </div>
        </div>
    </nav>

    <header class="pt-48 pb-20 text-center relative z-10 px-4">
        <h2 class="text-5xl md:text-8xl font-black tracking-tighter mb-4 glow-text">
            COSMIC ACTION<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-violet-500">PORTAL</span>
        </h2>
        <p class="text-lg text-gray-400 max-w-xl mx-auto mb-10">Explore the vastness of gaming in our high-performance universal engine.</p>
        <button class="px-10 py-4 bg-violet-600 rounded-full font-bold shadow-[0_0_20px_rgba(139,92,246,0.5)] hover:scale-110 transition">ENTER VOID</button>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32 space-y-24 relative z-10">
        
        <section id="puzzle">
            <h3 class="text-3xl font-bold mb-10 border-l-4 border-cyan-500 pl-4 tracking-widest">PUZZLE SECTOR</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="gameGrid">
                
                <div class="game-card p-8 rounded-3xl text-center group" data-name="2048 matrix">
                    <i class="fas fa-th-large text-5xl text-cyan-400 mb-6 transition group-hover:scale-125"></i>
                    <h4 class="text-2xl font-bold mb-2">2048 MATRIX</h4>
                    <p class="text-gray-500">Level: Quantum</p>
                </div>

                <div class="game-card p-8 rounded-3xl text-center group" data-name="snake protocol">
                    <i class="fas fa-wave-square text-5xl text-green-400 mb-6 transition group-hover:scale-125"></i>
                    <h4 class="text-2xl font-bold mb-2">SNAKE PROTOCOL</h4>
                    <p class="text-gray-500">Level: Hyperdrive</p>
                </div>

                <div class="game-card p-8 rounded-3xl text-center group" data-name="neon tictactoe">
                    <i class="fas fa-times-circle text-5xl text-violet-400 mb-6 transition group-hover:scale-125"></i>
                    <h4 class="text-2xl font-bold mb-2">NEON TIC-TAC-TOE</h4>
                    <p class="text-gray-500">Level: Tactical</p>
                </div>

            </div>
        </section>

    </main>

    <script>
        // Particles Generator
        function initUniverse() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 150; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 2 + 1;
                p.style.width = p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.animationDuration = (Math.random() * 20 + 10) + 's';
                p.style.opacity = Math.random();
                container.appendChild(p);
            }
        }

        // Search Functionality
        const searchInput = document.getElementById('gameSearch');
        const cards = document.querySelectorAll('.game-card');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                if (name.includes(term)) {
                    card.style.display = "block";
                    card.style.opacity = "1";
                } else {
                    card.style.display = "none";
                }
            });
        });

        // 3D Tilt Effect
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width / 2) / 10;
                const y = (e.clientY - rect.top - rect.height / 2) / 10;
                card.style.transform = `perspective(1000px) rotateX(${-y}deg) rotateY(${x}deg) scale(1.05)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
            });
        });

        initUniverse();
    </script>
</body>
</html>

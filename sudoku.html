<!DOCTYPE html>
<html>
<head>
    <title>Math Ninja - Rudrax</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white text-center p-10">
    <h1 class="text-4xl font-bold text-yellow-500 mb-5">MATH NINJA</h1>
    <div class="text-6xl mb-8" id="question">2 + 2 = ?</div>
    <input type="number" id="answer" class="text-black p-4 rounded-xl text-2xl w-32 outline-none">
    <div id="score" class="mt-5 text-xl">Score: 0</div>
    
    <script>
        let score = 0;
        let correctAnswer;
        function nextQue() {
            let n1 = Math.floor(Math.random() * 10);
            let n2 = Math.floor(Math.random() * 10);
            correctAnswer = n1 + n2;
            document.getElementById('question').innerText = `${n1} + ${n2} = ?`;
            document.getElementById('answer').value = '';
        }
        document.getElementById('answer').addEventListener('input', (e) => {
            if(parseInt(e.target.value) === correctAnswer) {
                score++;
                document.getElementById('score').innerText = "Score: " + score;
                nextQue();
            }
        });
        nextQue();
    </script>
</body>
</html>

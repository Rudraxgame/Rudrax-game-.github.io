<!DOCTYPE html>
<html>
<head>
    <title>Emoji Sudoku - Rudrax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell { width: 60px; height: 60px; border: 2px solid #22d3ee; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }
        .cell:hover { background: #1e293b; }
    </style>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center p-10">
    <h1 class="text-3xl mb-5">EMOJI SUDOKU</h1>
    <div class="grid grid-cols-4 gap-1 bg-cyan-500 p-1" id="grid"></div>
    <p class="mt-4 text-cyan-400">Fill the grid with unique emojis!</p>
    <script>
        // Simple 4x4 Grid Logic
        const grid = document.getElementById('grid');
        const emojis = ['🐶', '🐱', '🐭', '🐹'];
        for(let i=0; i<16; i++) {
            const div = document.createElement('div');
            div.className = 'cell bg-slate-800';
            div.onclick = () => {
                let current = emojis.indexOf(div.innerText);
                div.innerText = emojis[(current + 1) % emojis.length];
            };
            grid.appendChild(div);
        }
    </script>
</body>
</html>

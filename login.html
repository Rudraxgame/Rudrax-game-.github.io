<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRAX - START PLAYING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        
        body {
            background: radial-gradient(circle, #0f172a, #000);
            height: 100vh; overflow: hidden; font-family: 'Orbitron';
            cursor: crosshair;
        }

        /* Pulsing Play Button Animation */
        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(234, 179, 8, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); }
        }
        .pulse-animation {
            animation: pulseBtn 2s infinite ease-in-out;
        }

        /* 3D Pop-Out on Hover */
        .play-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(34, 211, 238, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .play-card:hover {
            transform: perspective(1000px) translateZ(50px) rotateX(10deg);
            border-color: #fbbf24;
        }

        /* Floating Game Icons */
        .game-icon {
            position: absolute; pointer-events: none;
            opacity: 0.3; animation: floatIcon 15s infinite linear;
        }
        @keyframes floatIcon {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* Floating Bubbles (Matching your previous theme) */
        .bubble {
            position: absolute; background: rgba(34, 211, 238, 0.15);
            border-radius: 50%; animation: float 10s infinite linear;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(110vh) translateX(0); }
            100% { transform: translateY(-10vh) translateX(50px); }
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="bg-elements"></div>

    <div class="play-card p-16 rounded-[50px] text-center z-10 w-[450px]">
        <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400 mb-2">RUDRAX</h1>
        <p class="text-cyan-400 tracking-[12px] mb-12 text-sm">COSMIC GALAXY</p>

        <div class="flex justify-center mb-6">
            <button onclick="window.location.href='index.html'" 
                class="pulse-animation group relative flex items-center justify-center w-32 h-32 bg-yellow-500 rounded-full border-4 border-white shadow-[0_0_30px_rgba(251,191,36,0.6)] hover:bg-yellow-400 transition-colors">
                <div class="w-0 h-0 border-t-[20px] border-t-transparent border-l-[35px] border-l-white border-b-[20px] border-b-transparent ml-2"></div>
                
                <span class="absolute -bottom-12 scale-0 group-hover:scale-100 transition-transform bg-white text-black px-4 py-1 rounded-full text-xs font-bold">START!</span>
            </button>
        </div>

        <h2 class="text-white text-2xl font-bold mt-8 mb-2">READY TO PLAY?</h2>
        <p class="text-gray-400 text-xs tracking-wider uppercase">No Login Required • Fun Guaranteed</p>
    </div>

    <script>
        const container = document.getElementById('bg-elements');
        const icons = ['🎮', '🕹️', '🚀', '🎲', '⭐', '👾', '🧩'];

        // Generate Bubbles
        for(let i=0; i<25; i++) {
            let b = document.createElement('div');
            b.className = 'bubble';
            let size = Math.random() * 60 + 20;
            b.style.width = b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.animationDuration = (Math.random() * 8 + 5) + 's';
            b.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(b);
        }

        // Generate Floating Game Icons
        for(let i=0; i<15; i++) {
            let icon = document.createElement('div');
            icon.className = 'game-icon text-3xl';
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.animationDuration = (Math.random() * 12 + 8) + 's';
            icon.style.animationDelay = (Math.random() * 10) + 's';
            container.appendChild(icon);
        }

        // Simple Mouse Trail Effect
        document.addEventListener('mousemove', (e) => {
            let spark = document.createElement('div');
            spark.className = 'absolute w-1 h-1 bg-cyan-400 rounded-full pointer-events-none z-50';
            spark.style.left = e.pageX + 'px';
            spark.style.top = e.pageY + 'px';
            document.body.appendChild(spark);
            
            setTimeout(() => {
                spark.style.transform = 'scale(4)';
                spark.style.opacity = '0';
                setTimeout(() => spark.remove(), 300);
            }, 10);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudrax Cosmic Hub - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #020208; }
        
        #canvas-container { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; 
        }
        
        /* Exact Transparent Glassmorphic Plate from the Image */
        .login-interface {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(150, 100, 255, 0.25);
            padding: 45px 30px;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                        inset 0 0 25px rgba(0, 240, 255, 0.1);
            text-align: center;
            width: 88%;
            max-width: 360px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Interactive touch response for children */
        .login-interface:active {
            transform: translate(-50%, -48%) scale(0.98);
        }
        
        .brand-text { 
            font-size: 2rem; font-weight: 900; letter-spacing: 4px; color: #ffffff; 
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.6); margin-top: 15px; 
        }
        .subtitle { 
            font-size: 0.9rem; letter-spacing: 3px; color: #8a99ad; 
            margin-bottom: 35px; text-transform: uppercase; font-weight: 700; 
        }
        
        /* Neon Jimming/Blinking Pulse Google Button */
        .google-btn {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.95); color: #121212;
            width: 100%; padding: 15px; border-radius: 50px; border: none;
            font-size: 1.05rem; font-weight: 700; cursor: pointer;
            animation: neonJim 2s infinite alternate ease-in-out;
        }
        
        @keyframes neonJim {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
            100% { transform: scale(1.03); box-shadow: 0 0 25px rgba(0, 240, 255, 0.8), 0 0 15px rgba(112, 0, 255, 0.6); }
        }
        
        .google-btn img { width: 22px; margin-right: 12px; }
        .secure-lock { font-size: 0.75rem; color: #4e5d73; margin-top: 25px; letter-spacing: 1px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="login-interface">
        <h1 class="brand-text">RUDRAX</h1>
        <p class="subtitle">LOGIN</p>
        
        <button class="google-btn" onclick="startPlay()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google">
            <span>Sign in with Google</span>
        </button>
        <p class="secure-lock">🔒 Safe & secure for young explorers</p>
    </div>

    <script>
        // --- 3D Scene Configuration ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020208); // Galaxy Dark Space

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Cinematic Cosmic Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const neonCyan = new THREE.PointLight(0x00f0ff, 2.5, 40);
        neonCyan.position.set(-4, 4, 4);
        scene.add(neonCyan);

        const neonPurple = new THREE.PointLight(0x7000ff, 2.5, 40);
        neonPurple.position.set(4, -4, 4);
        scene.add(neonPurple);

        // --- Perfectly Styled 3D 'R' Logo Group ---
        const logoGroup = new THREE.Group();
        const logoMat = new THREE.MeshStandardMaterial({
            color: 0x112255, roughness: 0.1, metalness: 0.9,
            emissive: 0x0066ff, emissiveIntensity: 0.3
        });

        const spine = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2.8, 0.6), logoMat);
        spine.position.x = -0.6;
        logoGroup.add(spine);

        const loop = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.3, 16, 32, Math.PI * 1.5), logoMat);
        loop.position.set(-0.3, 0.7, 0);
        loop.rotation.z = -Math.PI / 2;
        logoGroup.add(loop);

        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.5), logoMat);
        leg.position.set(0.1, -0.7, 0);
        leg.rotation.z = -Math.PI / 3.5;
        logoGroup.add(leg);

        scene.add(logoGroup);
        logoGroup.position.set(0, 1.4, 0); // Placed safely above text

        // --- Bottom-To-Top Rising Bubbles & Mini Games Items ---
        const cosmosObjects = [];
        const totalItems = 65; // Optimized for lag-free fast loading

        for(let i=0; i<totalItems; i++) {
            let geometry;
            const typeChance = Math.random();
            
            if(typeChance < 0.6) {
                // Crystal Shiny Bubble
                geometry = new THREE.SphereGeometry(Math.random() * 0.2 + 0.08, 16, 16);
            } else if (typeChance < 0.85) {
                // Game Cube/Box Token
                geometry = new THREE.BoxGeometry(0.18, 0.18, 0.18);
            } else {
                // Game Cone/Pyramid Token
                geometry = new THREE.ConeGeometry(0.12, 0.25, 4);
            }

            const material = new THREE.MeshStandardMaterial({
                color: Math.random() > 0.5 ? 0x00f0ff : 0x7000ff,
                roughness: 0.2, metalness: 0.8, transparent: true,
                opacity: Math.random() * 0.5 + 0.3
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(
                (Math.random() - 0.5) * 14,
                (Math.random() - 0.5) * 10 - 2, // Distributed across screen
                (Math.random() - 0.5) * 8
            );

            mesh.userData = {
                riseSpeed: Math.random() * 0.015 + 0.006,
                rotX: Math.random() * 0.02,
                rotY: Math.random() * 0.02
            };

            scene.add(mesh);
            cosmosObjects.push(mesh);
        }

        // --- Child-Touch Interaction Logic ---
        window.addEventListener('pointerdown', () => {
            // Bubbles float out further and expand slightly when touched
            cosmosObjects.forEach(obj => {
                obj.position.z += 1.2;
                setTimeout(() => { obj.position.z -= 1.2; }, 350);
            });
        });

        // --- Animation Engine ---
        const clock = new THREE.Clock();

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const time = clock.getElapsedTime();

            // 1. Continuous Smooth Rotation & Hover of Logo
            logoGroup.rotation.y = time * 0.9;
            logoGroup.position.y = 1.3 + Math.sin(time * 1.6) * 0.1;

            // 2. Infinite Bottom-To-Top Rising Mechanics
            cosmosObjects.forEach(obj => {
                obj.position.y += obj.userData.riseSpeed;
                obj.rotation.x += obj.userData.rotX;
                obj.rotation.y += obj.userData.rotY;

                // Reset position to bottom once it goes off the top screen
                if(obj.position.y > 5) {
                    obj.position.y = -5;
                    obj.position.x = (Math.random() - 0.5) * 14;
                }
            });

            renderer.render(scene, camera);
        }
        renderLoop();

        // Responsive Mobile/Tablet Support
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function startPlay() {
            alert("Connecting to Google Secure Game Hub...");
        }
    </script>
</body>
</html>

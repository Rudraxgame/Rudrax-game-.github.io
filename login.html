<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRAX - COSMIC PLAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1e1b4b, #000);
            height: 100vh; overflow: hidden; font-family: 'Orbitron';
            cursor: crosshair; margin: 0;
        }

        /* Hardware Acceleration for Smoothness */
        .smooth-anim { will-change: transform, opacity; }

        /* Floating Card Animation */
        @keyframes floatCard {
            0%, 100% { transform: translateY(0px) perspective(1000px); }
            50% { transform: translateY(-15px) perspective(1000px); }
        }
        .main-card {
            animation: floatCard 4s infinite ease-in-out;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            transform-style: preserve-3d;
        }

        /* 3D Spinning R Logo */
        @keyframes spinR {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .r-logo {
            font-size: 80px; font-weight: 900;
            background: linear-gradient(to bottom, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: spinR 3s infinite linear;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.8));
        }

        /* Pulsing Golden Play Button with Aura */
        @keyframes auraPulse {
            0% { box-shadow: 0 0 10px #fbbf24, 0 0 20px #fbbf24; }
            50% { box-shadow: 0 0 30px #fbbf24, 0 0 60px #f59e0b; }
            100% { box-shadow: 0 0 10px #fbbf24, 0 0 20px #fbbf24; }
        }
        .play-btn {
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            animation: auraPulse 2s infinite ease-in-out;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .play-btn:hover { transform: scale(1.15) translateZ(30px); }

        /* Bubbles & Icons */
        .element {
            position: absolute; pointer-events: none; opacity: 0.4;
            animation: moveUp linear infinite;
        }
        @keyframes moveUp {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="bg-layer" class="absolute inset-0 overflow-hidden"></div>

    <div class="main-card p-10 rounded-[50px] text-center z-10 w-[420px]">
        
        <div class="mb-2">
            <span class="r-logo smooth-anim">R</span>
        </div>

        <h1 class="text-5xl font-black text-white mb-1 tracking-tighter">RUDRAX</h1>
        <p class="text-cyan-400 tracking-[10px] mb-10 text-[10px] font-bold">COSMIC GALAXY</p>

        <div class="flex justify-center mb-8">
            <button onclick="window.location.href='index.html'" 
                class="play-btn w-28 h-28 rounded-full flex items-center justify-center border-4 border-white shadow-2xl">
                <div class="w-0 h-0 border-t-[15px] border-t-transparent border-l-[25px] border-l-white border-b-[15px] border-b-transparent ml-2"></div>
            </button>
        </div>

        <h2 class="text-white text-xl font-bold tracking-widest">TAP TO ENTER</h2>
        <div class="mt-4 flex justify-center gap-2">
            <span class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce"></span>
            <span class="w-2 h-2 bg-violet-400 rounded-full animate-bounce [animation-delay:0.2s]"></span>
            <span class="w-2 h-2 bg-yellow-400 rounded-full animate-bounce [animation-delay:0.4s]"></span>
        </div>
    </div>

    <script>
        const bg = document.getElementById('bg-layer');
        const icons = ['🎮', '🚀', '👾', '🕹️', '🎲', '⭐', '🧩', '💎'];
        
        // Massive Density: 100 Elements (Bubbles + Icons)
        function createElements() {
            for(let i=0; i<100; i++) {
                const el = document.createElement('div');
                const isIcon = Math.random() > 0.6; // 40% are Game Icons
                
                if(isIcon) {
                    el.innerText = icons[Math.floor(Math.random() * icons.length)];
                    el.style.fontSize = Math.random() * 20 + 15 + 'px';
                    el.className = 'element smooth-anim';
                } else {
                    el.className = 'element smooth-anim bg-cyan-400/20 rounded-full';
                    const size = Math.random() * 40 + 5;
                    el.style.width = el.style.height = size + 'px';
                }

                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = Math.random() * 10 + 5 + 's';
                el.style.animationDelay = Math.random() * 10 + 's';
                bg.appendChild(el);
            }
        }

        createElements();

        // Magic Mouse Dust
        document.addEventListener('mousemove', (e) => {
            const dot = document.createElement('div');
            dot.className = 'absolute w-1 h-1 bg-yellow-400 rounded-full pointer-events-none z-50';
            dot.style.left = e.pageX + 'px';
            dot.style.top = e.pageY + 'px';
            document.body.appendChild(dot);
            setTimeout(() => {
                dot.style.transform = 'scale(5)';
                dot.style.opacity = '0';
                dot.style.transition = 'all 0.5s ease-out';
                setTimeout(() => dot.remove(), 500);
            }, 10);
        });
    </script>
</body>
</html>

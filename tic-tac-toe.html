<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe - Rudrax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1e1b4b; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; }
        .cell { width: 100px; height: 100px; border: 2px solid #22d3ee; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; transition: 0.3s; }
        .cell:hover { background: rgba(34, 211, 238, 0.1); }
        .win { background: #fbbf24 !important; color: black; }
    </style>
</head>
<body>
    <h1 class="text-4xl font-black mb-4 text-cyan-400">TIC-TAC-TOE</h1>
    <div id="status" class="mb-6 text-xl">Your turn (X)</div>
    
    <div class="grid grid-cols-3 bg-cyan-900/50 p-2 rounded-xl shadow-2xl" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <button onclick="resetGame()" class="mt-8 bg-yellow-500 text-black px-8 py-2 rounded-full font-bold hover:scale-110 transition-transform">RESTART</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        const cells = document.querySelectorAll('.cell');

        function makeMove(idx) {
            if (board[idx] === "" && gameActive) {
                board[idx] = "X";
                cells[idx].innerText = "X";
                cells[idx].style.color = "#22d3ee";
                if (checkWin("X")) return;
                
                gameActive = false; // Computer's turn
                document.getElementById('status').innerText = "Computer is thinking...";
                setTimeout(computerMove, 500);
            }
        }

        function computerMove() {
            let emptyCells = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (emptyCells.length > 0 && gameActive === false) {
                let randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomIdx] = "O";
                cells[randomIdx].innerText = "O";
                cells[randomIdx].style.color = "#fbbf24";
                if (!checkWin("O")) {
                    gameActive = true;
                    document.getElementById('status').innerText = "Your turn (X)";
                }
            }
        }

        function checkWin(player) {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]
            ];
            for (let pattern of winPatterns) {
                if (pattern.every(i => board[i] === player)) {
                    document.getElementById('status').innerText = player + " WINS!";
                    pattern.forEach(i => cells[i].classList.add('win'));
                    gameActive = false;
                    return true;
                }
            }
            if (!board.includes("")) {
                document.getElementById('status').innerText = "DRAW!";
                return true;
            }
            return false;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            document.getElementById('status').innerText = "Your turn (X)";
            cells.forEach(c => { c.innerText = ""; c.classList.remove('win'); });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - मस्ती गेम 🎮</title>
    <style>
        body { margin:0; padding:20px; background:linear-gradient(135deg,#4ade80,#22c55e); font-family:Arial,sans-serif; color:white; text-align:center; }
        .container { max-width:500px; margin:0 auto; background:rgba(255,255,255,0.2); padding:20px; border-radius:20px; }
        h1 { font-size:3rem; }
        #score { font-size:1.8rem; margin:10px 0; }
        #board { width:400px; height:400px; background:#1f2937; margin:20px auto; border:10px solid #111827; border-radius:10px; position:relative; display:grid; grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(20, 1fr); }
        .snake { background:#22c55e; border-radius:4px; }
        .food { background:#ef4444; border-radius:50%; }
        button { background:white; color:#166534; border:none; padding:12px 30px; font-size:1.2rem; border-radius:50px; cursor:pointer; }
        .back { color:white; text-decoration:none; font-size:1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake</h1>
        <div id="score">Score: 0</div>
        <div id="board"></div>
        <button onclick="newGame()">नया गेम शुरू करो</button><br><br>
        <a href="index.html" class="back">← होम पर वापस</a>
        <p style="margin-top:20px; font-size:1.1rem;">Arrow keys या Swipe से खेलो</p>
    </div>

    <script>
        const grid = 20;
        let snake = [{x:10, y:10}];
        let food = {x:15, y:15};
        let dx = 1, dy = 0;
        let score = 0;
        let gameInterval;
        const board = document.getElementById('board');

        function createBoard() {
            board.innerHTML = '';
            for (let i = 0; i < grid * grid; i++) {
                const cell = document.createElement('div');
                board.appendChild(cell);
            }
        }

        function draw() {
            createBoard();
            // Draw snake
            snake.forEach((part, index) => {
                const cell = board.children[part.y * grid + part.x];
                cell.classList.add('snake');
                if (index === 0) cell.style.background = '#86efac';
            });
            // Draw food
            const foodCell = board.children[food.y * grid + food.x];
            foodCell.classList.add('food');
        }

        function move() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = 'Score: ' + score;
                food = {x: Math.floor(Math.random()*grid), y: Math.floor(Math.random()*grid)};
            } else {
                snake.pop();
            }

            // Collision
            if (head.x < 0 || head.x >= grid || head.y < 0 || head.y >= grid || snake.slice(1).some(part => part.x === head.x && part.y === head.y)) {
                alert('Game Over! Score: ' + score);
                newGame();
                return;
            }

            draw();
        }

        function newGame() {
            snake = [{x:10, y:10}];
            dx = 1; dy = 0;
            score = 0;
            document.getElementById('score').textContent = 'Score: 0';
            food = {x:15, y:15};
            clearInterval(gameInterval);
            draw();
            gameInterval = setInterval(move, 150);
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
        });

        newGame();
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - मस्ती गेम 🎮</title>
    <style>
        body { margin:0; padding:10px; background:linear-gradient(135deg,#4ade80,#22c55e); font-family:Arial,sans-serif; color:white; text-align:center; overflow-x: hidden; touch-action: manipulation; }
        .container { max-width:100%; margin:0 auto; background:rgba(255,255,255,0.2); padding:15px; border-radius:20px; }
        h1 { font-size:2rem; margin: 10px 0; }
        #score { font-size:1.5rem; margin:5px 0; font-weight: bold; }
        
        /* Board Responsive settings */
        #board { 
            width: 300px; 
            height: 300px; 
            background:#1f2937; 
            margin:10px auto; 
            border:5px solid #111827; 
            border-radius:10px; 
            position:relative; 
            display:grid; 
            grid-template-columns: repeat(20, 1fr); 
            grid-template-rows: repeat(20, 1fr); 
        }

        @media (max-width: 350px) {
            #board { width: 260px; height: 260px; }
        }

        .snake { background:#22c55e; border-radius:2px; border: 1px solid #1f2937; }
        .food { background:#ef4444; border-radius:50%; box-shadow: 0 0 10px #ef4444; }
        
        /* Controller Buttons */
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 200px; margin: 20px auto; }
        .btn { 
            background: white; color: #166534; border: none; 
            padding: 15px; font-size: 1.5rem; border-radius: 15px; 
            cursor: pointer; font-weight: bold; box-shadow: 0 4px #ccc;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 #ccc; }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .right { grid-column: 3; }
        .down { grid-column: 2; }

        .action-btns { margin-top: 15px; }
        button.start-btn { background:#1f2937; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; }
        .back { color:white; text-decoration:none; display: block; margin-top: 15px; font-size: 1rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Mania</h1>
        <div id="score">Score: 0</div>
        <div id="board"></div>

        <div class="controls">
            <button class="btn up" onclick="changeDir('up')">▲</button>
            <button class="btn left" onclick="changeDir('left')">◀</button>
            <button class="btn right" onclick="changeDir('right')">▶</button>
            <button class="btn down" onclick="changeDir('down')">▼</button>
        </div>

        <div class="action-btns">
            <button class="start-btn" onclick="newGame()">नया गेम</button>
        </div>
        <a href="index.html" class="back">← होम पर वापस</a>
    </div>

    <script>
        const grid = 20;
        let snake = [{x:10, y:10}];
        let food = {x:15, y:15};
        let dx = 1, dy = 0;
        let score = 0;
        let gameInterval;
        const board = document.getElementById('board');

        function createBoard() {
            board.innerHTML = '';
            for (let i = 0; i < grid * grid; i++) {
                const cell = document.createElement('div');
                board.appendChild(cell);
            }
        }

        function draw() {
            createBoard();
            snake.forEach((part, index) => {
                if(part.y >= 0 && part.y < grid && part.x >= 0 && part.x < grid) {
                    const cell = board.children[part.y * grid + part.x];
                    cell.classList.add('snake');
                    if (index === 0) cell.style.background = '#86efac';
                }
            });
            const foodCell = board.children[food.y * grid + food.x];
            foodCell.classList.add('food');
        }

        function move() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= grid || head.y < 0 || head.y >= grid || snake.some(part => part.x === head.x && part.y === head.y)) {
                alert('Game Over! Score: ' + score);
                newGame();
                return;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = 'Score: ' + score;
                food = {x: Math.floor(Math.random()*grid), y: Math.floor(Math.random()*grid)};
            } else {
                snake.pop();
            }
            draw();
        }

        function changeDir(dir) {
            if (dir === 'left' && dx !== 1) { dx = -1; dy = 0; }
            if (dir === 'right' && dx !== -1) { dx = 1; dy = 0; }
            if (dir === 'up' && dy !== 1) { dx = 0; dy = -1; }
            if (dir === 'down' && dy !== -1) { dx = 0; dy = 1; }
        }

        function newGame() {
            snake = [{x:10, y:10}];
            dx = 1; dy = 0;
            score = 0;
            document.getElementById('score').textContent = 'Score: 0';
            food = {x:Math.floor(Math.random()*grid), y:Math.floor(Math.random()*grid)};
            clearInterval(gameInterval);
            draw();
            gameInterval = setInterval(move, 200);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') changeDir('left');
            if (e.key === 'ArrowRight') changeDir('right');
            if (e.key === 'ArrowUp') changeDir('up');
            if (e.key === 'ArrowDown') changeDir('down');
        });

        newGame();
    </script>
</body>
</html>

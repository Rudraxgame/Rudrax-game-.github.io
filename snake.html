
<!DOCTYPE html>
<html>
<head>
    <title>Cosmic Snake - Rudrax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: 'Orbitron', sans-serif; }
        canvas { border: 4px solid #334155; background: #000; box-shadow: 0 0 20px rgba(34, 211, 238, 0.5); border-radius: 10px; }
        .controls { margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { background: #1e293b; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; user-select: none; }
        .btn:active { background: #334155; }
    </style>
</head>
<body>
    <h1 class="text-3xl font-bold text-cyan-400 mb-2">COSMIC SNAKE</h1>
    <div class="mb-4 text-xl">Score: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <div class="controls md:hidden">
        <div></div><div class="btn" onclick="changeDir('up')">UP</div><div></div>
        <div class="btn" onclick="changeDir('left')">LEFT</div><div class="btn" onclick="changeDir('down')">DOWN</div><div class="btn" onclick="changeDir('right')">RIGHT</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        let score = 0;
        let box = 20;
        let snake = [{x: 10 * box, y: 10 * box}];
        let food = { x: Math.floor(Math.random() * 15) * box, y: Math.floor(Math.random() * 15) * box };
        let d = "right";

        document.addEventListener("keydown", direction);
        function direction(event) {
            if(event.keyCode == 37 && d != "right") d = "left";
            else if(event.keyCode == 38 && d != "down") d = "up";
            else if(event.keyCode == 39 && d != "left") d = "right";
            else if(event.keyCode == 40 && d != "up") d = "down";
        }

        function changeDir(dir) {
            if(dir == "left" && d != "right") d = "left";
            else if(dir == "up" && d != "down") d = "up";
            else if(dir == "right" && d != "left") d = "right";
            else if(dir == "down" && d != "up") d = "down";
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i=0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#22d3ee" : "#818cf8";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#fbbf24";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "left") snakeX -= box;
            if( d == "up") snakeY -= box;
            if( d == "right") snakeX += box;
            if( d == "down") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreEl.innerText = score;
                food = { x: Math.floor(Math.random() * 15) * box, y: Math.floor(Math.random() * 15) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeY < 0 || snakeX >= canvas.width || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Score: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i=0; i<array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 150);
    </script>
</body>
</html>

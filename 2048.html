          <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - मस्ती गेम 🎮</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 20px;
        }
        h1 { font-size: 3rem; margin: 10px 0; }
        #score { font-size: 1.8rem; margin: 10px 0; }
        #board {
            width: 400px;
            height: 400px;
            background: #bbada0;
            margin: 20px auto;
            border-radius: 10px;
            position: relative;
        }
        .tile {
            position: absolute;
            width: 90px;
            height: 90px;
            line-height: 90px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
        }
        .back { color: white; font-size: 1.2rem; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🟦 2048</h1>
        <div id="score">Score: 0</div>
        <div id="board"></div>
        <button onclick="newGame()">नया गेम</button>
        <br><a href="index.html" class="back">← होम पर वापस</a>
    </div>

    <script>
        let board = Array(4).fill().map(() => Array(4).fill(0));
        let score = 0;
        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');

        function newGame() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            scoreEl.textContent = 'Score: 0';
            addRandom();
            addRandom();
            render();
        }

        function addRandom() {
            let empty = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) empty.push({i, j});
                }
            }
            if (empty.length === 0) return;
            let {i, j} = empty[Math.floor(Math.random() * empty.length)];
            board[i][j] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] > 0) {
                        let tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.style.left = (j * 100 + 10) + 'px';
                        tile.style.top = (i * 100 + 10) + 'px';
                        tile.textContent = board[i][j];
                        tile.style.backgroundColor = getColor(board[i][j]);
                        tile.style.color = board[i][j] > 4 ? '#f9f6f2' : '#776e65';
                        boardEl.appendChild(tile);
                    }
                }
            }
        }

        function getColor(val) {
            const map = {2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#9c0',1024:'#33b679',2048:'#33b679'};
            return map[val] || '#3c3a32';
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            let moved = false;
            const oldBoard = JSON.stringify(board);

            if (e.key === 'ArrowLeft') moved = slideLeft();
            else if (e.key === 'ArrowRight') moved = slideRight();
            else if (e.key === 'ArrowUp') moved = slideUp();
            else if (e.key === 'ArrowDown') moved = slideDown();

            if (moved) {
                addRandom();
                render();
                scoreEl.textContent = 'Score: ' + score;
                if (board.flat().includes(2048)) alert('🎉 बधाई! आपने 2048 बना लिया!');
            }
        });

        // Slide functions
        function slideLeft() {
            let moved = false;
            for (let i = 0; i < 4; i++) {
                let row = board[i].filter(x => x !== 0);
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j+1]) {
                        row[j] *= 2;
                        score += row[j];
                        row.splice(j+1, 1);
                    }
                }
                while (row.length < 4) row.push(0);
                if (board[i].join() !== row.join()) moved = true;
                board[i] = row;
            }
            return moved;
        }

        function slideRight() {
            let moved = false;
            for (let i = 0; i < 4; i++) {
                let row = board[i].filter(x => x !== 0).reverse();
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j+1]) {
                        row[j] *= 2;
                        score += row[j];
                        row.splice(j+1, 1);
                    }
                }
                while (row.length < 4) row.push(0);
                row.reverse();
                if (board[i].join() !== row.join()) moved = true;
                board[i] = row;
            }
            return moved;
        }

        function slideUp() {
            let moved = false;
            for (let j = 0; j < 4; j++) {
                let col = [];
                for (let i = 0; i < 4; i++) col.push(board[i][j]);
                col = col.filter(x => x !== 0);
                for (let k = 0; k < col.length - 1; k++) {
                    if (col[k] === col[k+1]) {
                        col[k] *= 2;
                        score += col[k];
                        col.splice(k+1, 1);
                    }
                }
                while (col.length < 4) col.push(0);
                for (let i = 0; i < 4; i++) {
                    if (board[i][j] !== col[i]) moved = true;
                    board[i][j] = col[i];
                }
            }
            return moved;
        }

        function slideDown() {
            let moved = false;
            for (let j = 0; j < 4; j++) {
                let col = [];
                for (let i = 0; i < 4; i++) col.push(board[i][j]);
                col = col.filter(x => x !== 0).reverse();
                for (let k = 0; k < col.length - 1; k++) {
                    if (col[k] === col[k+1]) {
                        col[k] *= 2;
                        score += col[k];
                        col.splice(k+1, 1);
                    }
                }
                while (col.length < 4) col.push(0);
                col.reverse();
                for (let i = 0; i < 4; i++) {
                    if (board[i][j] !== col[i]) moved = true;
                    board[i][j] = col[i];
                }
            }
            return moved;
        }

        newGame();
    </script>
</body>
</html>

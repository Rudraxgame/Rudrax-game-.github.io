<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - मस्ती गेम 🎮</title>
    <style>
        body { margin:0; padding:20px; background:linear-gradient(135deg,#667eea,#764ba2); font-family:Arial,sans-serif; color:white; text-align:center; }
        .container { max-width:500px; margin:0 auto; background:rgba(255,255,255,0.2); padding:20px; border-radius:20px; }
        h1 { font-size:3rem; margin:10px 0; }
        #score { font-size:1.8rem; margin:10px 0; }
        #board { width:400px; height:400px; background:#bbada0; margin:20px auto; border-radius:10px; position:relative; box-shadow:0 10px 20px rgba(0,0,0,0.3); }
        .tile { position:absolute; width:90px; height:90px; line-height:90px; font-size:40px; font-weight:bold; border-radius:8px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; box-shadow:inset 0 4px 8px rgba(0,0,0,0.2); }
        button { background:white; color:#667eea; border:none; padding:12px 30px; font-size:1.2rem; border-radius:50px; cursor:pointer; margin:10px; }
        .back { color:white; text-decoration:none; font-size:1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🟦 2048</h1>
        <div id="score">Score: 0</div>
        <div id="board"></div>
        <button onclick="newGame()">नया गेम शुरू करो</button><br><br>
        <a href="index.html" class="back">← होम पेज पर वापस</a>
    </div>

    <script>
        let board = Array(4).fill().map(() => Array(4).fill(0));
        let score = 0;
        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');

        function newGame() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            scoreEl.textContent = 'Score: 0';
            addRandom(); addRandom();
            render();
        }

        function addRandom() {
            let empty = [];
            for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) if (board[i][j] === 0) empty.push({i,j});
            if (empty.length === 0) return;
            let p = empty[Math.floor(Math.random() * empty.length)];
            board[p.i][p.j] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] > 0) {
                        let t = document.createElement('div');
                        t.className = 'tile';
                        t.style.left = (j * 100 + 10) + 'px';
                        t.style.top = (i * 100 + 10) + 'px';
                        t.textContent = board[i][j];
                        t.style.backgroundColor = getColor(board[i][j]);
                        t.style.color = board[i][j] > 4 ? '#f9f6f2' : '#776e65';
                        boardEl.appendChild(t);
                    }
                }
            }
        }

        function getColor(v) {
            const colors = {2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#9c0',1024:'#33b679',2048:'#33b679'};
            return colors[v] || '#3c3a32';
        }

        // Full move logic
        function slide(row) {
            let r = row.filter(n => n !== 0);
            for (let i = 0; i < r.length - 1; i++) {
                if (r[i] === r[i+1]) {
                    r[i] *= 2;
                    score += r[i];
                    r.splice(i+1, 1);
                }
            }
            while (r.length < 4) r.push(0);
            return r;
        }

        function moveLeft() { let moved = false; for (let i = 0; i < 4; i++) { let old = board[i].join(); board[i] = slide(board[i]); if (old !== board[i].join()) moved = true; } return moved; }
        function moveRight() { let moved = false; for (let i = 0; i < 4; i++) { let old = board[i].join(); let r = board[i].slice().reverse(); r = slide(r); board[i] = r.reverse(); if (old !== board[i].join()) moved = true; } return moved; }
        function moveUp() { let moved = false; for (let j = 0; j < 4; j++) { let col = [board[0][j],board[1][j],board[2][j],board[3][j]]; let old = col.join(); col = slide(col); for (let i = 0; i < 4; i++) board[i][j] = col[i]; if (old !== col.join()) moved = true; } return moved; }
        function moveDown() { let moved = false; for (let j = 0; j < 4; j++) { let col = [board[0][j],board[1][j],board[2][j],board[3][j]]; let old = col.join(); col = col.reverse(); col = slide(col); col = col.reverse(); for (let i = 0; i < 4; i++) board[i][j] = col[i]; if (old !== col.join()) moved = true; } return moved; }

        // Keyboard
        document.addEventListener('keydown', e => {
            let moved = false;
            if (e.key === 'ArrowLeft') moved = moveLeft();
            else if (e.key === 'ArrowRight') moved = moveRight();
            else if (e.key === 'ArrowUp') moved = moveUp();
            else if (e.key === 'ArrowDown') moved = moveDown();

            if (moved) {
                addRandom();
                render();
                scoreEl.textContent = 'Score: ' + score;
                if (board.flat().includes(2048)) alert('🎉 बधाई हो! आपने 2048 बना लिया!');
            }
        });

        // Mobile Swipe Support
        let touchStartX = 0, touchStartY = 0;
        boardEl.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        boardEl.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            let moved = false;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 50) moved = moveRight();
                else if (dx < -50) moved = moveLeft();
            } else {
                if (dy > 50) moved = moveDown();
                else if (dy < -50) moved = moveUp();
            }
            if (moved) {
                addRandom();
                render();
                scoreEl.textContent = 'Score: ' + score;
            }
        });

        newGame();
    </script>
</body>
</html>

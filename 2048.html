<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - मस्ती गेम 🎮</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Comic Neue', Arial, sans-serif;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.2);
            padding: 25px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 3.5rem; margin: 10px 0; }
        #score { font-size: 2rem; margin: 15px 0; font-weight: bold; }
        #board {
            width: 420px;
            height: 420px;
            background: #bbada0;
            margin: 20px auto;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .tile {
            position: absolute;
            width: 92px;
            height: 92px;
            line-height: 92px;
            font-size: 45px;
            font-weight: bold;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.2);
        }
        button {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 1.4rem;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🟦 2048</h1>
        <div id="score">Score: 0</div>
        <div id="board"></div>
        <button onclick="newGame()">नया गेम शुरू करो</button><br>
        <a href="index.html" class="back-btn">← होम पेज पर वापस जाओ</a>
    </div>

    <script>
        let board = Array.from({length: 4}, () => Array(4).fill(0));
        let score = 0;
        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');

        function newGame() {
            board = Array.from({length: 4}, () => Array(4).fill(0));
            score = 0;
            scoreEl.textContent = 'Score: 0';
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            let empty = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) empty.push({i, j});
                }
            }
            if (empty.length === 0) return;
            let pos = empty[Math.floor(Math.random() * empty.length)];
            board[pos.i][pos.j] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] !== 0) {
                        let tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.style.left = (j * 105 + 12) + 'px';
                        tile.style.top = (i * 105 + 12) + 'px';
                        tile.textContent = board[i][j];
                        tile.style.backgroundColor = getColor(board[i][j]);
                        tile.style.color = board[i][j] >= 8 ? '#f9f6f2' : '#776e65';
                        boardEl.appendChild(tile);
                    }
                }
            }
        }

        function getColor(value) {
            const colors = {
                2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
                32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
                512: '#9c0', 1024: '#33b679', 2048: '#33b679'
            };
            return colors[value] || '#3c3a32';
        }

        // Full working move functions
        function slide(row) {
            let r = row.filter(n => n !== 0);
            for (let i = 0; i < r.length - 1; i++) {
                if (r[i] === r[i + 1]) {
                    r[i] *= 2;
                    score += r[i];
                    r.splice(i + 1, 1);
                }
            }
            while (r.length < 4) r.push(0);
            return r;
        }

        function moveLeft() {
            let moved = false;
            for (let i = 0; i < 4; i++) {
                let old = board[i].join(',');
                board[i] = slide(board[i]);
                if (old !== board[i].join(',')) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let i = 0; i < 4; i++) {
                let old = board[i].join(',');
                let reversed = board[i].slice().reverse();
                let slided = slide(reversed);
                board[i] = slided.reverse();
                if (old !== board[i].join(',')) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let j = 0; j < 4; j++) {
                let col = [board[0][j], board[1][j], board[2][j], board[3][j]];
                let old = col.join(',');
                let slided = slide(col);
                for (let i = 0; i < 4; i++) board[i][j] = slided[i];
                if (old !== slided.join(',')) moved = true;
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let j = 0; j < 4; j++) {
                let col = [board[0][j], board[1][j], board[2][j], board[3][j]];
                let old = col.join(',');
                let reversed = col.reverse();
                let slided = slide(reversed);
                let finalCol = slided.reverse();
                for (let i = 0; i < 4; i++) board[i][j] = finalCol[i];
                if (old !== finalCol.join(',')) moved = true;
            }
            return moved;
        }

        document.addEventListener('keydown', (e) => {
            let moved = false;
            if (e.key === 'ArrowLeft') moved = moveLeft();
            else if (e.key === 'ArrowRight') moved = moveRight();
            else if (e.key === 'ArrowUp') moved = moveUp();
            else if (e.key === 'ArrowDown') moved = moveDown();

            if (moved) {
                addRandomTile();
                render();
                scoreEl.textContent = 'Score: ' + score;
                if (board.flat().includes(2048)) {
                    setTimeout(() => alert('🎉 बधाई हो! आपने 2048 बना लिया!'), 300);
                }
            }
        });

        // Start the game
        newGame();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Color Memory - Rudrax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111827; font-family: 'Orbitron', sans-serif; display: flex; flex-col; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .pad { width: 120px; height: 120px; border-radius: 20px; cursor: pointer; transition: 0.2s; opacity: 0.5; border: 4px solid rgba(255,255,255,0.1); }
        .pad:active { transform: scale(0.95); }
        .active { opacity: 1; transform: scale(1.05); box-shadow: 0 0 30px white; }
    </style>
</head>
<body class="flex flex-col items-center">
    <h1 class="text-3xl font-bold text-white mb-4">COLOR MEMORY</h1>
    <p id="status" class="text-cyan-400 mb-8 text-xl font-bold">Press Start!</p>

    <div class="grid grid-cols-2 gap-4">
        <div id="red" class="pad bg-red-500" onclick="userClick('red')"></div>
        <div id="blue" class="pad bg-blue-500" onclick="userClick('blue')"></div>
        <div id="green" class="pad bg-green-500" onclick="userClick('green')"></div>
        <div id="yellow" class="pad bg-yellow-500" onclick="userClick('yellow')"></div>
    </div>

    <button onclick="startGame()" id="start-btn" class="mt-10 bg-white text-black px-10 py-3 rounded-full font-bold hover:bg-cyan-400 transition-colors">START GAME</button>

    <script>
        let sequence = [];
        let userSequence = [];
        let level = 0;
        const colors = ['red', 'blue', 'green', 'yellow'];

        function startGame() {
            sequence = [];
            level = 0;
            document.getElementById('start-btn').classList.add('hidden');
            nextLevel();
        }

        function nextLevel() {
            userSequence = [];
            level++;
            document.getElementById('status').innerText = "Level " + level;
            const randomColor = colors[Math.floor(Math.random() * 4)];
            sequence.push(randomColor);
            playSequence();
        }

        async function playSequence() {
            for (let color of sequence) {
                await new Promise(res => setTimeout(res, 600));
                flash(color);
            }
        }

        function flash(color) {
            const el = document.getElementById(color);
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 300);
        }

        function userClick(color) {
            flash(color);
            userSequence.push(color);
            checkAnswer(userSequence.length - 1);
        }

        function checkAnswer(idx) {
            if (userSequence[idx] === sequence[idx]) {
                if (userSequence.length === sequence.length) {
                    setTimeout(nextLevel, 1000);
                }
            } else {
                document.getElementById('status').innerText = "Game Over! Score: " + (level - 1);
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('start-btn').innerText = "Try Again";
            }
        }
    </script>
</body>
</html>

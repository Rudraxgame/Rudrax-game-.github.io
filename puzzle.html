<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Games - मस्ती गेम 🎮</title>
    <style>
        body { margin:0; padding:20px; background:linear-gradient(135deg,#a855f7,#ec4899); font-family:Arial,sans-serif; color:white; text-align:center; }
        .container { max-width:900px; margin:0 auto; }
        h1 { font-size:3rem; margin:20px 0; }
        .games-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px; margin-top:30px; }
        .game-card { background:rgba(255,255,255,0.2); border-radius:20px; overflow:hidden; transition:0.3s; }
        .game-card:hover { transform:scale(1.05); }
        .game-card .icon { height:180px; display:flex; align-items:center; justify-content:center; font-size:5rem; background:#fff; color:#000; }
        .game-card h3 { margin:15px; font-size:1.5rem; }
        button { background:white; color:#a855f7; border:none; padding:12px 30px; font-size:1.2rem; border-radius:50px; cursor:pointer; margin:20px 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Puzzle Games</h1>
        <p style="font-size:1.4rem;">Bacchon ke liye sabse mazedaar puzzle games!</p>

        <div class="games-grid">
            <!-- 2048 -->
            <a href="2048.html" class="game-card">
                <div class="icon">🟦</div>
                <h3>2048 Puzzle</h3>
                <p>Numbers jod ke 2048 banao!</p>
            </a>

            <!-- Snake -->
            <a href="snake.html" class="game-card">
                <div class="icon">🐍</div>
                <h3>Snake Game</h3>
                <p>Classic snake khelo!</p>
            </a>

            <!-- Tic-Tac-Toe (agla game) -->
            <a href="#" onclick="alert('Tic-Tac-Toe jaldi aa raha hai!')" class="game-card">
                <div class="icon">❌⭕</div>
                <h3>Tic-Tac-Toe</h3>
                <p>Dost ke saath khelo!</p>
            </a>
        </div>

        <button onclick="history.back()">← Wapas Home Page pe</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe - मस्ती गेम</title>
    <style>
        body { margin:0; padding:20px; background:linear-gradient(135deg,#ec4899,#a855f7); font-family:Arial,sans-serif; color:white; text-align:center; }
        .container { max-width:500px; margin:0 auto; background:rgba(255,255,255,0.2); padding:20px; border-radius:20px; }
        h1 { font-size:2.8rem; }
        #board { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:300px; margin:20px auto; }
        .cell { background:white; color:#000; height:90px; font-size:2.5rem; display:flex; align-items:center; justify-content:center; border-radius:10px; cursor:pointer; }
        button { background:white; color:#a855f7; border:none; padding:12px 30px; font-size:1.2rem; border-radius:50px; cursor:pointer; margin:10px; }
        .back { color:white; text-decoration:none; font-size:1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>❌ Tic-Tac-Toe ⭕</h1>
        <div id="board"></div>
        <button onclick="newGame()">नया गेम</button><br><br>
        <a href="puzzle.html" class="back">← Puzzle Games पर वापस</a>
    </div>

    <script>
        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        const boardEl = document.getElementById('board');

        function createBoard() {
            boardEl.innerHTML = '';
            board.forEach((_, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = board[i];
                cell.onclick = () => makeMove(i);
                boardEl.appendChild(cell);
            });
        }

        function makeMove(i) {
            if (board[i] || checkWinner()) return;
            board[i] = currentPlayer;
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            createBoard();
            if (checkWinner()) alert(currentPlayer === 'X' ? 'O jeet gaya!' : 'X jeet gaya!');
            else if (!board.includes(null)) alert('Draw!');
        }

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(combo => {
                const [a,b,c] = combo;
                return board[a] && board[a] === board[b] && board[a] === board[c];
            });
        }

        function newGame() {
            board = Array(9).fill(null);
            currentPlayer = 'X';
            createBoard();
        }

        newGame();
    </script>
</body>
</html>

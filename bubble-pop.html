<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop - Rudrax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0c4a6e; font-family: 'Arial', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .bubble {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(34, 211, 238, 0.6));
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; transition: transform 0.1s;
        }
        .bubble:active { transform: scale(1.5); opacity: 0; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="z-10 text-white mt-5 text-center">
        <h1 class="text-4xl font-black tracking-widest">BUBBLE POP!</h1>
        <div class="text-2xl mt-2 bg-black/30 px-6 py-2 rounded-full">Score: <span id="score">0</span></div>
    </div>

    <div id="game-area" class="absolute inset-0"></div>

    <script>
        let score = 0;
        const gameArea = document.getElementById('game-area');
        const scoreDisplay = document.getElementById('score');

        function createBubble() {
            const bubble = document.createElement('div');
            const size = Math.random() * 60 + 40; // 40px to 100px
            const startX = Math.random() * (window.innerWidth - size);
            
            bubble.className = 'bubble';
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = startX + 'px';
            bubble.style.bottom = "-100px";

            bubble.onclick = () => {
                score++;
                scoreDisplay.innerText = score;
                bubble.remove();
            };

            gameArea.appendChild(bubble);

            // Bubble floating up logic
            let position = -100;
            const speed = Math.random() * 2 + 1;
            const floatInterval = setInterval(() => {
                position += speed;
                bubble.style.bottom = position + 'px';
                
                if (position > window.innerHeight) {
                    clearInterval(floatInterval);
                    bubble.remove();
                }
            }, 10);
        }

        // Generate bubbles every 800ms
        setInterval(createBubble, 800);
    </script>
</body>
</html>
